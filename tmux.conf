set -g default-terminal "tmux-256color"

# Keep tmux, iTerm2, and terminal applications in agreement about keys and
# drawing capabilities. iTerm2 profiles should use xterm-256color outside tmux.
set -as terminal-features "xterm-256color:RGB:usstyle"
set -as terminal-features "xterm*:extkeys"
set -s extended-keys on
set -s extended-keys-format csi-u
set -sg escape-time 10

# Raw passthrough can let nested terminal apps leave iTerm2 in a mode tmux does
# not fully track. Enable it per-command only if a tool needs it.
set -g allow-passthrough off
set -g history-limit 100000

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

setw -g aggressive-resize on

# automatically renumber tmux windows
set -g renumber-windows on

# don't rename if I set a name for the window
set-option -g allow-rename off

# make window/pane index start with 1
set -g base-index 1
setw -g pane-base-index 1

# mouse
set-option -g mouse on

# ======================================
# Window options
# ======================================
# Copy-mode
set-window-option -g mode-keys vi
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-selection
bind-key -Tcopy-mode-vi 'C-v' send -X rectangle-toggle

# ======================================
# Key bindings
# ======================================
# Pane-movement
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Moving windows
bind-key -r > swap-window -t :+
bind-key -r < swap-window -t :-

# Resize pane shortcuts
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# split window and fix path for tmux 1.9
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# new window in the same directory
bind-key c new-window -c "#{pane_current_path}"

bind-key x kill-pane # override for killing without confirm

# Synchronize panes
bind-key * set-window-option synchronize-pane

# Clear pane
bind-key C send-keys -R \; clear-history

# Join pane
bind-key v command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

bind-key 0 run "tmux split-window -l 12 'ZDOTDIR=~/.oh-my-zsh/custom/zeroconfig zsh -ci ftpane'"
bind-key s run "tmux split-window -l 12 'ZDOTDIR=~/.oh-my-zsh/custom/zeroconfig zsh -ci fs'"

# Floating per-directory Claude popup. Same cwd → same session, so
# re-pressing prefix+y re-attaches the same Claude instance for that dir.
bind -r y run-shell '\
  SESSION="claude-$(printf %s "#{pane_current_path}" | shasum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" claude; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Floating lazygit popup scoped to the current pane's directory.
# Wide popup (90%) — diffs need horizontal room.
bind -r g display-popup -w90% -h90% -d "#{pane_current_path}" -E lazygit

# Floating nvim popup scoped to the current pane's directory.
# Use :Files (fzf.vim) inside to fuzzy-open files, :q to drop back to Claude.
bind -r e display-popup -w90% -h90% -d "#{pane_current_path}" -E nvim

# Full-window nvim pre-loaded with every file Claude has changed in this
# session (git working tree ∪ per-session edit log written by tmux-claude-hooks.py).
# A real window (not a popup) so you can prefix+C-h/C-l back to Claude while the
# review stays open. Inside nvim: :n / :N to step through, :Buffers (fzf.vim) to
# jump; :qa closes the window.
bind E run-shell '\
  files=$(cd "#{pane_current_path}" && ~/.claude/scripts/claude-changed-files.sh | tr "\n" " "); \
  if [ -n "$files" ]; then \
    tmux new-window -n review -c "#{pane_current_path}" "nvim $files"; \
  else \
    tmux display-message "No changed files in #{pane_current_path}"; \
  fi'

# Capture current pane scrollback into $EDITOR for searching/saving.
# -J joins soft-wrapped lines so long URLs/errors come back on one line.
# -S - starts from the top of the history buffer (whole scrollback).
# sed: strip 2-space left margin AND trailing whitespace (tmux pads each
# captured line out to the full pane width with spaces).
bind V run-shell '\
  f=$(mktemp -t tmux-capture); \
  tmux capture-pane -J -p -S - | sed -e "s/^  //" -e "s/[[:space:]]*\$//" > "$f"; \
  tmux new-window -n capture "${EDITOR:-vim} $f"'

# ======================================
# Decoration
# ======================================
set -g status-justify left
set -g status-left-length 32
set -g status-right-length 150
set -g status-interval 5

# status bar
set -g status-position top

tm_session_name='#[fg=default,bold]#S'
tm_pane_tty='#[fg=brightcyan]#{pane_tty}#[default]'

set -g status-left $tm_session_name' '
set -g status-right '#{prefix_highlight} '$tm_pane_tty

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'off'
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_show_copy_mode 'on'

set -g @plugin 'seebi/tmux-colors-solarized'
set -g @colors-solarized 'dark'

set -g @plugin 'tmux-plugins/tmux-logging'

# === Claude Code attention indicator ===
# @cc-status states set by ~/.claude/hooks/tmux-claude-hooks.py:
#   working = solarized blue bg (#268bd2) — Claude is busy
#   workflow = solarized violet bg (#6c71c4) — background work is in flight
#     (@cc-workflow > 0): a Workflow run, a background Agent, or a background
#     Bash task. Claude is waiting on ITS OWN work, not on you — you CAN type,
#     but there is nothing to act on yet. Outranks the grey idle/done look but
#     not blue. Set on the launching tool's PostToolUse and retired on the
#     no-prompt Stop of its completion re-invoke.
#   waiting/done = base01 bg (#586e75) cyan+cream — Claude needs you
# ESC-cancel and any stuck marker: clear with prefix+u (no hook fires on ESC).
# Current window: brackets + bold always.
# Two trailing per-window segments, fed by options set in tmux-claude-hooks.py:
#   - reheat marker: bold-red token count (@cc-reheat) shown when the last turn
#     had to re-create a cold prompt cache; cleared on the next prompt.
#   - cache TTL countdown (@cc-cache-ts via cc-cache-remaining.sh): 1h cache.
#     Hidden WHILE WORKING (cache stays warm during a turn — the idle clock only
#     starts at turn end) and while warm. Shows M:SS in the last 10 min of idle
#     (yellow, then red under 2 min), then a persistent red "● Nm" marker
#     once expired so a blank tab unambiguously means warm.
set -g window-status-format         '#{?#{==:#{@cc-status},working},#[bg=#268bd2#,fg=#fdf6e3] #I#[fg=#eee8d5]:#W #[default],#{?#{@cc-workflow},#[bg=#6c71c4#,fg=#fdf6e3] #I#[fg=#eee8d5]:#W #[default],#{?#{@cc-status},#[bg=#586e75#,fg=#2aa198] #I#[fg=#eee8d5]:#W #[default],#[fg=#586e75]#I#[fg=default]:#W#[default]}}}#{?#{@cc-reheat}, #[fg=#dc322f#,bold]#{@cc-reheat}#[default],}#{?#{==:#{@cc-status},working},,#(~/.claude/hooks/cc-cache-remaining.sh #{@cc-cache-ts})}'
# Keep this line and the current-format line in sync.
set -g window-status-current-format '#{?#{==:#{@cc-status},working},#[bg=#268bd2#,fg=#fdf6e3#,bold] [#I#[fg=#eee8d5#,bold]:#W#[fg=#fdf6e3#,bold]] #[default],#{?#{@cc-workflow},#[bg=#6c71c4#,fg=#fdf6e3#,bold] [#I#[fg=#eee8d5#,bold]:#W#[fg=#fdf6e3#,bold]] #[default],#{?#{@cc-status},#[bg=#586e75#,fg=#2aa198#,bold] [#I#[fg=#eee8d5#,bold]:#W#[fg=#2aa198#,bold]] #[default],#[fg=#2aa198#,bold] [#[fg=#586e75#,bold]#I#[fg=default#,bold]:#W#[fg=#2aa198#,bold]] #[default]}}}#{?#{@cc-reheat}, #[fg=#dc322f#,bold]#{@cc-reheat}#[default],}#{?#{==:#{@cc-status},working},,#(~/.claude/hooks/cc-cache-remaining.sh #{@cc-cache-ts})}'

# Manually clear the Claude attention markers on the current window. The only
# reliable reset for states no hook can clear — chiefly an ESC interrupt (no
# Stop fires, so "working" blue would otherwise stay latched), a stuck violet
# workflow marker, or a lingering cache countdown / reheat note left after a
# session closed. Must unset the same options as action_reset in
# tmux-claude-hooks.py — including @cc-cache-ts (drives the duration note) and
# @cc-reheat — or those keep rendering after the colour is already cleared.
bind u set-option -uw @cc-status \; set-option -uw @cc-workflow \; set-option -uw @cc-turn-had-prompt \; set-option -uw @cc-waiting-tool \; set-option -uw @cc-cache-ts \; set-option -uw @cc-reheat \; display-message "Claude indicator reset"

# Reload this config without restarting tmux.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Re-name the current Claude window NOW from the recent dialogue (prefix+R),
# instead of waiting for the automatic turn-1/2 renames. Runs the "rename" action
# of tmux-claude-hooks.py with TMUX_PANE set to the active pane; the model picks a
# fresh folder-led name and it appears a moment later (async). Replaces the old
# "rename the window to RENAME" sentinel.
bind R run-shell "TMUX_PANE='#{pane_id}' python3 ~/.claude/hooks/tmux-claude-hooks.py rename" \; display-message "Renaming Claude window…"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
